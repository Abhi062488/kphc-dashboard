<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — KPHC Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #030810;
  font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: rgba(255,255,255,.9);
  padding: 20px;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 40px;
  padding-bottom: 20px;
  border-bottom: 1px solid rgba(0,212,255,.2);
}

.title {
  font-size: 28px;
  font-weight: 600;
  color: rgba(0,212,255,.95);
  letter-spacing: 1px;
}

.logout-btn {
  background: rgba(255,60,60,.2);
  border: 1px solid rgba(255,60,60,.4);
  color: rgba(255,120,120,.95);
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s;
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.logout-btn:hover {
  background: rgba(255,60,60,.3);
  border-color: rgba(255,60,60,.6);
}

.content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.panel {
  background: linear-gradient(160deg, rgba(4,18,38,.8), rgba(2,12,28,.9));
  border: 1px solid rgba(0,212,255,.2);
  backdrop-filter: blur(20px);
  padding: 30px;
  border-radius: 12px;
}

.panel-title {
  font-size: 18px;
  font-weight: 600;
  color: rgba(0,212,255,.9);
  margin-bottom: 20px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: rgba(0,212,255,.75);
  margin-bottom: 6px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}

.form-input {
  width: 100%;
  padding: 10px 12px;
  background: rgba(5,15,30,.8);
  border: 1px solid rgba(0,212,255,.2);
  border-radius: 6px;
  color: rgba(255,255,255,.9);
  font-size: 13px;
  font-family: inherit;
  transition: all 0.3s;
}

.form-input:focus {
  outline: none;
  border-color: rgba(0,212,255,.6);
  box-shadow: 0 0 15px rgba(0,212,255,.1);
}

.form-input::placeholder {
  color: rgba(255,255,255,.35);
}

.btn {
  padding: 10px 16px;
  background: linear-gradient(135deg, rgba(0,212,255,.3), rgba(0,150,255,.2));
  border: 1px solid rgba(0,212,255,.4);
  border-radius: 6px;
  color: rgba(0,212,255,.95);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s;
  font-family: 'JetBrains Mono', monospace;
  width: 100%;
}

.btn:hover:not(:disabled) {
  background: linear-gradient(135deg, rgba(0,212,255,.5), rgba(0,150,255,.3));
  border-color: rgba(0,212,255,.7);
  box-shadow: 0 0 20px rgba(0,212,255,.15);
}

.btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.message {
  padding: 12px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
  font-family: 'JetBrains Mono', monospace;
}

.message.success {
  background: rgba(0,230,138,.1);
  border: 1px solid rgba(0,230,138,.3);
  color: rgba(0,230,138,.9);
  display: block;
}

.message.error {
  background: rgba(255,60,60,.1);
  border: 1px solid rgba(255,60,60,.3);
  color: rgba(255,120,120,.9);
  display: block;
}

.users-list {
  max-height: 400px;
  overflow-y: auto;
}

.user-item {
  background: rgba(0,212,255,.05);
  border: 1px solid rgba(0,212,255,.1);
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.user-info {
  flex: 1;
}

.user-name {
  font-weight: 600;
  color: rgba(0,212,255,.9);
  margin-bottom: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.user-email {
  font-size: 11px;
  color: rgba(255,255,255,.55);
}

.delete-btn {
  background: rgba(255,60,60,.2);
  border: 1px solid rgba(255,60,60,.3);
  color: rgba(255,120,120,.8);
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 10px;
  transition: all 0.3s;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.delete-btn:hover {
  background: rgba(255,60,60,.3);
  border-color: rgba(255,60,60,.5);
}

.empty-state {
  text-align: center;
  padding: 30px;
  color: rgba(255,255,255,.35);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
}

.security-info {
  background: rgba(255,180,40,.05);
  border: 1px solid rgba(255,180,40,.2);
  padding: 12px;
  border-radius: 6px;
  font-size: 11px;
  color: rgba(255,180,40,.85);
  line-height: 1.6;
  margin-bottom: 16px;
  font-family: 'JetBrains Mono', monospace;
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">Admin Panel</div>
    <a href="/logout" class="logout-btn">Logout</a>
  </div>

  <div class="content">
    <!-- Add User Panel -->
    <div class="panel">
      <div class="panel-title">Add New Client</div>
      
      <div class="security-info">
        ⚠️ Admin Password Required: Change <code>ADMIN_PASSWORD</code> in production
      </div>

      <div class="message" id="addMessage"></div>

      <form onsubmit="handleAddUser(event)">
        <div class="form-group">
          <label class="form-label">Admin Password</label>
          <input 
            type="password" 
            id="adminPass" 
            class="form-input" 
            placeholder="Enter admin password"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">Username</label>
          <input 
            type="text" 
            id="newUsername" 
            class="form-input" 
            placeholder="e.g., client01"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">Password</label>
          <input 
            type="password" 
            id="newPassword" 
            class="form-input" 
            placeholder="Enter secure password"
            required
          >
        </div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input 
            type="email" 
            id="newEmail" 
            class="form-input" 
            placeholder="client@example.com"
          >
        </div>

        <button type="submit" class="btn" id="addBtn">Add Client</button>
      </form>
    </div>

    <!-- Users List Panel -->
    <div class="panel">
      <div class="panel-title">Active Clients</div>

      <div class="message" id="listMessage"></div>

      <div class="users-list" id="usersList">
        <div class="empty-state">Loading clients...</div>
      </div>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'admin123'; // Change in production!

// Load users on page load
document.addEventListener('DOMContentLoaded', loadUsers);

async function loadUsers() {
  try {
    const response = await fetch('/api/users', {
      headers: {
        'x-admin-pass': ADMIN_PASSWORD
      }
    });

    const usersList = document.getElementById('usersList');
    
    if (!response.ok) {
      usersList.innerHTML = '<div class="empty-state">❌ Authorization failed. Check admin password.</div>';
      return;
    }

    const users = await response.json();

    if (users.length === 0) {
      usersList.innerHTML = '<div class="empty-state">No clients added yet</div>';
      return;
    }

    usersList.innerHTML = users.map(user => `
      <div class="user-item">
        <div class="user-info">
          <div class="user-name">${user.username}</div>
          <div class="user-email">${user.email || 'No email'}</div>
        </div>
        <button class="delete-btn" onclick="deleteUser(${user.id})">Delete</button>
      </div>
    `).join('');
  } catch (error) {
    document.getElementById('usersList').innerHTML = '<div class="empty-state">❌ Error loading users</div>';
  }
}

async function handleAddUser(event) {
  event.preventDefault();

  const adminPass = document.getElementById('adminPass').value;
  const username = document.getElementById('newUsername').value;
  const password = document.getElementById('newPassword').value;
  const email = document.getElementById('newEmail').value;
  const addBtn = document.getElementById('addBtn');
  const message = document.getElementById('addMessage');

  addBtn.disabled = true;
  addBtn.textContent = 'Adding...';

  try {
    const response = await fetch('/api/users', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-admin-pass': adminPass
      },
      body: JSON.stringify({ username, password, email })
    });

    const data = await response.json();

    if (response.ok) {
      message.className = 'message success';
      message.textContent = '✓ Client added successfully';
      document.getElementById('newUsername').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('newEmail').value = '';
      loadUsers();
    } else {
      message.className = 'message error';
      message.textContent = '❌ ' + (data.error || 'Failed to add client');
    }
  } catch (error) {
    message.className = 'message error';
    message.textContent = '❌ Connection error';
  }

  addBtn.disabled = false;
  addBtn.textContent = 'Add Client';
}

async function deleteUser(userId) {
  if (!confirm('Are you sure you want to delete this client?')) return;

  const adminPass = prompt('Enter admin password to confirm:');
  if (!adminPass) return;

  try {
    const response = await fetch(`/api/users/${userId}`, {
      method: 'DELETE',
      headers: {
        'x-admin-pass': adminPass
      }
    });

    if (response.ok) {
      loadUsers();
    } else {
      alert('Failed to delete user');
    }
  } catch (error) {
    alert('Error deleting user');
  }
}
</script>
</body>
</html>
